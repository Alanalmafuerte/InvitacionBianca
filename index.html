<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitación de Cumpleaños</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Georgia', serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #ffe6f3, #f8c8dc, #e8d5ff);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #6b2d5c;
    }

    .card {
      width: 100%;
      max-width: 390px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      padding: 24px 18px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(128, 65, 120, 0.25);
      border: 3px solid #f7c6d9;
      position: relative;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      font-size: 24px;
      animation: float 3s infinite ease-in-out;
      opacity: 0.8;
    }

    .sparkle.one { top: 15px; left: 18px; }
    .sparkle.two { top: 30px; right: 22px; animation-delay: 1s; }
    .sparkle.three { bottom: 18px; left: 28px; animation-delay: 1.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .crown {
      font-size: 44px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 17px;
      letter-spacing: 1px;
      color: #b35a91;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 34px;
      color: #8d3d75;
      margin-bottom: 6px;
    }

    .age {
      font-size: 22px;
      background: #fff1b8;
      color: #8a5a00;
      display: inline-block;
      padding: 8px 16px;
      border-radius: 18px;
      margin: 10px 0 18px;
      font-weight: bold;
    }

    .photo-main {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 6px solid #ffd6ea;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      margin-bottom: 18px;
      background: #f7c6d9;
    }

    .message {
      font-size: 17px;
      line-height: 1.5;
      margin-bottom: 20px;
      padding: 0 8px;
    }

    .details {
      background: #fff5fb;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 18px;
      display: none;
      animation: fadeIn 0.6s ease;
    }

    .details p {
      font-size: 16px;
      margin: 10px 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    button, .btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px;
      font-size: 17px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, #d95fa3, #a855c7);
      color: white;
      box-shadow: 0 8px 16px rgba(168, 85, 199, 0.28);
    }

    .btn-whatsapp {
      background: #25D366;
      color: white;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .gallery img {
      width: 100%;
      height: 90px;
      object-fit: cover;
      border-radius: 14px;
      border: 3px solid #ffd6ea;
    }

    .footer {
      font-size: 14px;
      color: #9b5c85;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="sparkle one">✨</div>
    <div class="sparkle two">⭐</div>
    <div class="sparkle three">✨</div>

    <div class="crown">👑</div>
    <div class="subtitle">Te invito a mi cumple</div>

    <h1>Nombre de tu hija</h1>
    <div class="age">Cumplo 5 años</div>

    <!-- Cambiar foto-principal.jpg por la foto real -->
    <img class="photo-main" src="foto-principal.jpg" alt="Foto principal" />

    <p class="message">
      Vení a vivir una tarde mágica llena de juegos, alegría y mucha diversión.
    </p>

    <button class="btn-primary" onclick="mostrarDetalles()">Ver invitación</button>

    <div class="details" id="details">
      <p>📅 <strong>Fecha:</strong> Sábado 10 de mayo</p>
      <p>⏰ <strong>Hora:</strong> 17:00 hs</p>
      <p>📍 <strong>Lugar:</strong> Dirección del salón o casa</p>

      <div class="gallery">
        <img src="foto1.jpg" alt="Foto 1" />
        <img src="foto2.jpg" alt="Foto 2" />
        <img src="foto3.jpg" alt="Foto 3" />
      </div>

      <a class="btn btn-whatsapp" href="https://wa.me/549XXXXXXXXXX?text=Hola%2C%20confirmo%20asistencia%20al%20cumple" target="_blank">
        Confirmar por WhatsApp
      </a>
    </div>

    <div class="footer">Una celebración de princesa 💖</div>
  </div>

  <script>
    function mostrarDetalles() {
      const details = document.getElementById('details');
      details.style.display = 'block';
    }
  </script>

</body>
</html>
